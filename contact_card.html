<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hemal Gogri — Spinnerz Globe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --navy: #0f1a35;
  --navy2: #162040;
  --red: #c0192a;
  --red2: #e01f32;
  --white: #ffffff;
  --off: #f3f5fa;
  --muted: #64708a;
  --border: #dde2ee;
  --shadow-sm: 0 2px 12px rgba(15,26,53,0.08);
  --shadow: 0 6px 28px rgba(15,26,53,0.13);
  --r: 18px;
}
 
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--off);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 48px;
}
 
.page { width: 100%; max-width: 420px; }
 
/* ── HERO ── */
.hero {
  position: relative;
  background: var(--navy);
  padding: 40px 24px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-radius: 0 0 40px 40px;
  overflow: hidden;
}
 
/* decorative circles */
.hero::before {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  border: 1px solid rgba(192,25,42,0.18);
  top: -80px; right: -80px;
}
.hero::after {
  content: '';
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
  bottom: -60px; left: -30px;
}
.hero-glow {
  position: absolute;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(192,25,42,0.22) 0%, transparent 70%);
  top: 20px; right: 20px;
  pointer-events: none;
}
 
.logo-wrap {
  width: 160px;
  margin-bottom: 28px;
  position: relative; z-index: 1;
  animation: fadeDown 0.6s ease both;
}
.logo-wrap img { width: 100%; border-radius: 6px; display: block; }
 
.avatar {
  width: 82px; height: 82px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  background: linear-gradient(135deg, rgba(192,25,42,0.3), rgba(255,255,255,0.08));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', cursive;
  font-size: 30px; letter-spacing: 2px;
  color: rgba(255,255,255,0.9);
  margin-bottom: 16px;
  position: relative; z-index: 1;
  animation: fadeDown 0.6s 0.1s ease both;
}
 
.hero-name {
  font-family: 'Bebas Neue', cursive;
  font-size: 34px; letter-spacing: 2.5px;
  color: #fff;
  line-height: 1;
  margin-bottom: 6px;
  position: relative; z-index: 1;
  animation: fadeDown 0.6s 0.15s ease both;
}
.hero-meta {
  display: flex; align-items: center; gap: 10px;
  position: relative; z-index: 1;
  animation: fadeDown 0.6s 0.2s ease both;
}
.hero-role {
  font-size: 12.5px; font-weight: 400;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.4px;
}
.dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.25); }
.hero-company {
  font-size: 12px; font-weight: 600;
  color: var(--red2);
  letter-spacing: 0.6px;
  text-transform: uppercase;
}
 
/* ── TAGLINE ── */
.tagline-bar {
  width: calc(100% - 48px);
  margin: -1px 24px 0;
  background: var(--red);
  border-radius: 0 0 14px 14px;
  padding: 8px 20px;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 10.5px; font-weight: 500;
  color: rgba(255,255,255,0.88);
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: fadeDown 0.6s 0.25s ease both;
}
 
/* ── CARDS ── */
.section {
  padding: 24px 20px 0;
}
.section-label {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  color: var(--muted);
  margin-bottom: 12px;
  padding-left: 2px;
}
 
.cards { display: flex; flex-direction: column; gap: 10px; }
 
.card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow-sm);
  text-decoration: none;
  cursor: pointer;
  font-family: inherit;
  width: 100%;
  transition: transform 0.13s ease, box-shadow 0.13s ease;
  animation: fadeUp 0.5s ease both;
}
.card:nth-child(1) { animation-delay: 0.3s; }
.card:nth-child(2) { animation-delay: 0.36s; }
.card:nth-child(3) { animation-delay: 0.42s; }
.card:nth-child(4) { animation-delay: 0.48s; }
.card:active { transform: scale(0.975); box-shadow: var(--shadow-sm); }
 
.card-icon {
  width: 44px; height: 44px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-icon svg { width: 21px; height: 21px; }
 
.card-body { flex: 1; text-align: left; }
.card-title {
  font-size: 14px; font-weight: 600;
  color: var(--navy);
  display: block; line-height: 1.2;
}
.card-sub {
  font-size: 11.5px; font-weight: 400;
  color: var(--muted);
  display: block; margin-top: 2px;
}
.card-arrow { color: var(--border); font-size: 20px; flex-shrink: 0; margin-right: 2px; }
 
.ic-call { background: #e6f2ff; }
.ic-wa   { background: #e6f9ee; }
.ic-web  { background: #edeeff; }
.ic-cat  { background: #fff3e6; }
 
/* ── SAVE CONTACT ── */
.save-card {
  background: var(--navy);
  border-color: var(--navy);
}
.save-card .card-title { color: #fff; }
.save-card .card-sub   { color: rgba(255,255,255,0.5); }
.save-card .card-arrow { color: rgba(255,255,255,0.2); }
.save-card .card-icon  { background: rgba(255,255,255,0.1); }
 
/* ── FOOTER ── */
.footer {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  margin-top: 32px;
  padding: 0 20px;
  line-height: 1.8;
}
.footer a { color: var(--red); text-decoration: none; font-weight: 500; }
.footer-divider {
  width: 32px; height: 2px;
  background: var(--red);
  border-radius: 2px;
  margin: 0 auto 12px;
  opacity: 0.5;
}
 
/* ── ANIMATIONS ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
